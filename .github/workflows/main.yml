name: Build & Release

on: 
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  release: 
    name: release
    runs-on: ubuntu-latest
    permissions: 
      contents: write
      packages: write
      issues: write
      pull-requests: write
      id-token: write
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4
        with 
          ref: main
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org/"
      - name: Install dependencies
        run: npm ci
      - name: Build package
        run: npm run build
      - name: Publish package
        run: npm publish
        env: 
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
